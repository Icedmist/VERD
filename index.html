<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="VERD — AI-powered crop diagnostics and agricultural intelligence for African farmers" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>VERD — Intelligent Crop Diagnostics</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          colors: {
            brand: {
              cyan: 'var(--brand-cyan, #00E5FF)',
              blue: 'var(--brand-blue, #0055FF)',
              gold: '#FFD700',
            },
            verd: {
              50: 'var(--verd-50, #edfcf2)', 100: 'var(--verd-100, #d4f7e0)', 200: 'var(--verd-200, #acedc6)', 300: 'var(--verd-300, #75dea4)',
              400: 'var(--verd-400, #3ec97e)', 500: 'var(--verd-500, #1aaf63)', 600: 'var(--verd-600, #0d8d4e)', 700: 'var(--verd-700, #0b7141)',
              800: 'var(--verd-800, #0c5935)', 900: 'var(--verd-900, #0a492d)', 950: 'var(--verd-950, #042919)',
            },
            surface: {
              50: 'var(--surface-50, #f8fafc)', 100: 'var(--surface-100, #f1f5f9)', 200: 'var(--surface-200, #e2e8f0)', 300: 'var(--surface-300, #cbd5e1)',
              400: 'var(--surface-400, #94a3b8)', 500: 'var(--surface-500, #64748b)', 600: 'var(--surface-600, #475569)', 700: 'var(--surface-700, #334155)',
              800: 'var(--surface-800, #1e293b)', 900: 'var(--surface-900, #0f172a)', 950: 'var(--surface-950, #020617)',
            }
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.25rem',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="src/style.css" />
</head>

<body class="bg-surface-950 text-surface-200 font-sans min-h-screen antialiased">
  <div id="app" class="min-h-screen flex flex-col"></div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- TensorFlow.js for ML-powered scanning -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

  <!-- App Core -->
  <script src="src/utils/icons.js"></script>
  <script src="src/utils/dom.js"></script>
  <script src="src/state.js"></script>
  <script src="src/services/supabase.js"></script>
  <script src="src/services/weather.js"></script>
  <script src="src/services/scanner.js"></script>
  <script src="src/services/auth.js"></script>
  <script src="src/services/firestore.js"></script>
  <script src="src/components/WeatherWidget.js"></script>
  <script src="src/components/Card.js"></script>
  <script src="src/components/Modal.js"></script>
  <script src="src/components/NeuralNetAnim.js"></script>
  <script src="src/components/VoiceScanner.js"></script>
  <script src="src/components/ReportCard.js"></script>
  <script src="src/components/Layout.js"></script>
  <script src="src/pages/Home.js"></script>
  <script src="src/pages/Login.js"></script>
  <script src="src/pages/Register.js"></script>
  <script src="src/pages/Dashboard.js"></script>
  <script src="src/pages/AdminDashboard.js"></script>
  <script src="src/pages/Scan.js"></script>
  <script src="src/pages/ScanResults.js"></script>
  <script src="src/pages/ScanHistory.js"></script>
  <script src="src/pages/Marketplace.js"></script>
  <script src="src/pages/NotFound.js"></script>
  <script src="src/router.js"></script>
  <script src="src/main.js"></script>
  <script src="src/utils/offline.js"></script>
  <script>
    // Register Service Worker for offline support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(() => {
        console.log('[VERD] Service Worker registered');
      }).catch(err => console.warn('[VERD] SW registration failed:', err));
    }
  </script>
</body>

</html>
