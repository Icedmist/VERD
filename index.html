<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="VERD — AI-powered crop diagnostics and agricultural intelligence for African farmers" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>VERD — Intelligent Crop Diagnostics</title>
  <link rel="manifest" href="/public/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          colors: {
            verd: {
              50: '#edfcf2', 100: '#d4f7e0', 200: '#acedc6', 300: '#75dea4',
              400: '#3ec97e', 500: '#1aaf63', 600: '#0d8d4e', 700: '#0b7141',
              800: '#0c5935', 900: '#0a492d', 950: '#042919',
            },
            surface: {
              50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
              400: '#a3a3a3', 500: '#737373', 600: '#525252', 700: '#404040',
              800: '#262626', 900: '#171717', 950: '#0a0a0a',
            }
          },
          borderRadius: {
            '2xl': '1rem',
            '3xl': '1.25rem',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="src/style.css" />
</head>

<body class="bg-surface-950 text-surface-200 font-sans min-h-screen antialiased">
  <div id="app" class="min-h-screen flex flex-col"></div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ═══════════════════════════════════════════
    //  FIREBASE CONFIG — Replace with your keys
    // ═══════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "DEMO_API_KEY",
      authDomain: "verd-demo.firebaseapp.com",
      projectId: "verd-demo",
      storageBucket: "verd-demo.appspot.com",
      messagingSenderId: "000000000000",
      appId: "1:000000000000:web:0000000000000000"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.__firebase = { auth, db, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile, doc, setDoc, getDoc, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, where };
  </script>

  <!-- TensorFlow.js + MobileNet for ML-powered scanning -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>

  <!-- App Core -->
  <script src="src/utils/icons.js"></script>
  <script src="src/utils/dom.js"></script>
  <script src="src/state.js"></script>
  <script src="src/services/weather.js"></script>
  <script src="src/services/scanner.js"></script>
  <script src="src/services/auth.js"></script>
  <script src="src/services/firestore.js"></script>
  <script src="src/components/WeatherWidget.js"></script>
  <script src="src/components/Card.js"></script>
  <script src="src/components/Modal.js"></script>
  <script src="src/components/NeuralNetAnim.js"></script>
  <script src="src/components/VoiceScanner.js"></script>
  <script src="src/components/Layout.js"></script>
  <script src="src/pages/Login.js"></script>
  <script src="src/pages/Register.js"></script>
  <script src="src/pages/Dashboard.js"></script>
  <script src="src/pages/AdminDashboard.js"></script>
  <script src="src/pages/Scan.js"></script>
  <script src="src/pages/ScanResults.js"></script>
  <script src="src/pages/Marketplace.js"></script>
  <script src="src/pages/NotFound.js"></script>
  <script src="src/router.js"></script>
  <script src="src/main.js"></script>
  <script src="src/utils/offline.js"></script>
</body>

</html>
