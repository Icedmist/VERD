<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="VERD — AI-powered crop disease detection for African farmers. Scan crops with your phone, get instant diagnosis and treatment recommendations. Works offline." />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph -->
    <meta property="og:title" content="VERD — Intelligent Crop Diagnostics" />
    <meta property="og:description"
        content="AI-powered crop disease detection that runs entirely on your phone. No internet needed." />
    <meta property="og:type" content="website" />

    <title>VERD — AI Crop Disease Detection for African Farmers</title>

    <!-- PWA & Assets -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="public/logo.png" type="image/png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <!-- Global CSS -->
    <link rel="stylesheet" href="src/style.css" />
</head>

<body class="bg-surface-950 text-surface-200">
    <!-- SPA Shell -->
    <div id="app"></div>

    <!-- ────────────────────────────────────────── -->
    <!--  Core Dependencies                         -->
    <!-- ────────────────────────────────────────── -->

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ────────────────────────────────────────── -->

    <!-- ────────────────────────────────────────── -->

    <script src="src/utils/icons.js"></script>
    <script src="src/utils/dom.js"></script>

    <!-- State Management -->
    <script src="src/state.js"></script>

    <!-- Services -->
    <script src="src/services/weather.js"></script>
    <script src="src/services/scanner.js"></script>
    <script src="src/services/auth.js"></script>
    <script src="src/services/firestore.js"></script>

    <!-- Components -->
    <script src="src/components/WeatherWidget.js"></script>
    <script src="src/components/Card.js"></script>
    <script src="src/components/Modal.js"></script>
    <script src="src/components/NeuralNetAnim.js"></script>
    <script src="src/components/VoiceScanner.js"></script>
    <script src="src/components/ReportCard.js"></script>

    <script src="src/pages/Dashboard.js"></script>
    <script src="src/pages/AdminDashboard.js"></script>
    <script src="src/pages/Scan.js"></script>
    <script src="src/pages/ScanResults.js"></script>
    <script src="src/pages/ScanHistory.js"></script>
    <script src="src/pages/Marketplace.js"></script>
    <script src="src/pages/NotFound.js"></script>

    <!-- Router & Main -->
    <script src="src/router.js"></script>
    <script src="src/main.js"></script>

    <script src="src/utils/offline.js"></script>
